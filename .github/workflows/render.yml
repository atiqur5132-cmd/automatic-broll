name: Cloud Video Renderer
on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Choose composition to render: YTVideo (16:9 HD Video) or YTShorts (9:16 Vertical Shorts)'
        required: true
        default: 'YTVideo'
        type: choice
        options:
          - YTVideo
          - YTShorts

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Remotion Dependencies
        run: npm ci

      - name: Ensure Remotion Browser (Chromium)
        run: npx remotion browser ensure

      - name: Verify Audio Sync & Composition Requirements
        run: npm run verify

      - name: Cloud Render Video
        run: npx remotion render src/index.ts ${{ inputs.composition }} out/rendered-video.mp4

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cloud-Rendered-Video-${{ inputs.composition }}
          path: out/rendered-video.mp4
          retention-days: 7
