name: Render Remotion Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: "Choose composition ID to render"
        required: true
        default: "ToxicRelationshipsShort"
        type: choice
        options:
          - ToxicRelationshipsShort
          - MyVideo

jobs:
  render:
    name: Render Video
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render Remotion Composition
        run: npx remotion render ${{ inputs.composition }} out/${{ inputs.composition }}.mp4 --concurrency=4 --gl=egl

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-${{ inputs.composition }}
          path: out/${{ inputs.composition }}.mp4
          retention-days: 7
