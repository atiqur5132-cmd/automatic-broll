name: Render Remotion Video

on:
  workflow_dispatch:

jobs:
  render:
    name: Render Video
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies (FFmpeg & Chrome dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install npm dependencies
        run: npm ci

      - name: Render video
        run: npx remotion render MyVideo out/video.mp4

      - name: Upload finished video artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-privacy-video
          path: out/video.mp4
