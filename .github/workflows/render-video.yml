name: Render Remotion Video

on:
  workflow_dispatch:

jobs:
  render:
    name: Render Video
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render Remotion Composition
        run: npx remotion render MyVideo out/gemini_35_pro_delay.mp4 --props="{}"

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini_35_pro_delay
          path: out/gemini_35_pro_delay.mp4
